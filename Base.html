
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="base.css">
    <title>TP - Connexion & Inscription en SPA</title>
</head>
<body>
    <div id="app">
        <!-- Page de Connexion -->
        <section id="login-page" class="page active">
            <form id="login-form">
                <section class="form-container">
                    <h1>Connexion</h1>
                    
                    <div class="input-box">
                        <input type="email" id="login-email" placeholder="Adresse e-mail" required>
                    </div>
                    
                    <div class="input-box">
                        <input type="password" id="login-password" placeholder="Mot de passe" required>
                    </div>
                    
                    
                    <div id="login-error" class="error-message"></div>
                    
                    <button type="submit" class="connexion-btn">Se connecter</button>
                    
                    <div class="register-link">
                        <p>Pas encore de compte ? <a href="#" id="to-register">Créer un compte</a></p>
                    </div>
                </section>
            </form>
        </section>

        <!-- Page d'Inscription -->
        <section id="register-page" class="page">
            <form id="register-form">
                <section class="form-container">
                    <h1>Inscription</h1>
                    
                    <div class="input-box">
                        <input type="text" id="register-name" placeholder="Nom" required>
                    </div>
                    
                    <div class="input-box">
                        <input type="email" id="register-email" placeholder="Adresse e-mail" required>
                    </div>
                    
                    <div class="input-box">
                        <input type="password" id="register-password" placeholder="Mot de passe" required>
                    </div>
                    
                    <div class="input-box">
                        <input type="password" id="register-confirm-password" placeholder="Confirmer le mot de passe" required>
                    </div>

                    <div class="forgot_passwd">
                        <label><input type="checkbox" id="remember-me"> Se souvenir de moi</label>
                    </div>
                    
                    <div id="register-error" class="error-message"></div>
                    
                    <button type="submit" class="inscription-btn">Créer mon compte</button>
                    
                    <div class="connexion-link">
                        <p>Vous avez déjà un compte ? <a href="#" id="to-login">Se connecter</a></p>
                    </div>
                </section>
            </form>
        </section>

        <!-- Page d'Accueil -->
        <section id="home-page" class="page">
            <section class="home-container">
                <h1>Bienvenue sur notre site !</h1>
                <p id="welcome-message"></p>
                <button id="logout-btn" class="logout-btn">Se déconnecter</button>
            </section>
        </section>
    </div>

    <script src="Base.js"></script>
</body>
</html>
